<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="floating-elements"></div>

  <div class="wrapper">
<div class="button-container">
    
    <button class="btn-circle" id="button1"></button>

    <div class="btn-ribbon-wrapper" id="button2">
      <div class="envelope">
        <svg width="80" height="50" viewBox="0 0 100 65" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="96" height="60" fill="white" stroke="#7dd3fc" stroke-width="2"/>
          <line x1="2" y1="2" x2="50" y2="35" stroke="#7dd3fc" stroke-width="2"/>
          <line x1="98" y1="2" x2="50" y2="35" stroke="#7dd3fc" stroke-width="2"/>
          <path d="M50,45 C50,45 35,35 35,22 C35,12 47,12 50,19 C53,12 65,12 65,22 C65,35 50,45 50,45 Z" fill="#dc2626" stroke="#991b1b" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="ribbon">
        Hawoo po, Click HERE!!!
      </div>
    </div>

  </div>
  </div>

  <script>
    const emojis = ['❤️','💖','💗','💓','🧸'];

    function createFloating() {
      const container = document.querySelector('.floating-elements');

      for (let i = 0; i < 25; i++) {
        const el = document.createElement('div');
        el.className = 'float';
        el.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

        el.style.left = Math.random() * 100 + 'vw';
        el.style.animationDuration = (5 + Math.random() * 5) + 's';

        container.appendChild(el);
      }
    }

    createFloating();

    const button1 = document.getElementById('button1');
    const button2 = document.getElementById('button2');

    // 2. Beri perintah saat Tombol 1 diklik
    button1.addEventListener('click', () => {
      // Sembunyikan tombol 1
      button1.classList.add('hide');
      // Munculkan tombol 2
      button2.classList.add('show');
    });

    // Opsional: Jika Tombol 2 diklik, kembalikan lagi ke awal (biar animasinya bisa dicoba berkali-kali)
    button2.addEventListener('click', () => {
      button1.classList.remove('hide');
      window.location.href = "start.html"
    });

  </script>

</body>
</html>
